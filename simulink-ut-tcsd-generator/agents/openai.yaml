interface:
  display_name: "Simulink UT TCSD Generator"
  short_description: "Generate and repair coverage-closed unit-test TCSD Excel cases from Simulink SLX/MAT models."
  default_prompt: "Use this skill to generate coverage-first Simulink unit-test TCSD cases from a .slx model and matching .mat file; assume the platform/Hermes Agent has already copied the selected project addon into the workspace root, treat every copied addon file and folder as intentionally provided project context, run setup_ut_support(rootDir) before model load/SATK/simulation so the full workspace tree is on MATLAB path and explicit or recognized initialization scripts run, inspect the actual workspace addon contents because file names, file types, folder layout, and file count vary by project, do not assume fixed support files such as init_Global.m, ITKLib.slx, or a specific .sldd, load relevant support/tool folders, init scripts, referenced libraries, and data dictionaries from the workspace instead of copying the old bundled assets/support-package as a production default, SATK/MCP/MATLAB model reading as the authority, use optional SATK 2026.06.01+ model_check as an early structural diagnostic, use Stateflow-aware model_query_params and enhanced model_read for MATLAB Function blocks when available, use granular Subsystem/container classification for enable/trigger/if-action prerequisites, repair SATK tools path after restoredefaultpath before declaring model_read/model_overview unavailable, static SLX XML only as a post-SATK supplement via scripts/inspect_slx_xml.py, model-derived Condition/Decision/MCDC obligation matrix before drafting TCSD rows, RelationalOperator equality-bank coverage for every compared enum/constant value plus valid non-matching baselines, Logical Operator AND/OR MC/DC truth-vector coverage, Abs pre-source sign coverage, Switch/Relational trigger true-false coverage, MinMax winner and MultiPortSwitch selector coverage, Saturate pre-limit input proof or unreachable justification, Stateflow/state/mode transition path tracing before drafting, conservative transition hold timing instead of assuming one request signal is enough, hard semantic consistency gate between state-transition claims and simulation-backed expValue outputs, default all-scalar-root-output simulation backfill with stateful exclusions, continuous-output plausibility and output-family consistency gates for physical outputs, minimum functional-domain coverage density, vector root-input element assignments, final action delay markers, coverage-feedback closure with probes/reruns, canonical Excel template assets/templates/tcsd_template.xlsx, hard workbook/rootPorts validation for ordinary input assignments and expValue left-hand sides with internal repair/rebuild before user-facing failure, top-level-Outport-only expectations, simulation backfill, and outputs/<model>_Test0001_tcsd.xlsx workbook."
